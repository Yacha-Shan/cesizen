name: CI

# Déclenche le pipeline sur chaque push et chaque pull request ciblant main,
# afin de valider le code AVANT qu'il ne parte en déploiement automatique sur Render.
on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]

jobs:
  tests:
    name: Lint & Tests
    runs-on: ubuntu-latest

    # Base de données PostgreSQL éphémère, dédiée au pipeline de CI.
    # Les identifiants correspondent au DATABASE_URL par défaut du projet (.env).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: "!ChangeMe!"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: ctype, iconv, pdo, pdo_pgsql
          coverage: none
          tools: composer:v2

      - name: Cache des dépendances Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installation des dépendances
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Vérification du fichier composer.json / composer.lock
        run: composer validate --strict --no-check-publish

      - name: Lint de la configuration YAML
        run: php bin/console lint:yaml config --parse-tags

      - name: Lint des templates Twig
        run: php bin/console lint:twig templates

      - name: Lint du container de services
        run: php bin/console lint:container --env=test


      - name: Création de la base de test
        env:
            APP_ENV: test
        run: php bin/console doctrine:database:create --env=test --if-not-exists

      - name: Application des migrations sur la base de test
        env:
            APP_ENV: test
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Exécution des tests (PHPUnit)
        env:
          APP_ENV: test
        run: vendor/bin/phpunit --testdox
